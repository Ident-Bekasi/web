<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🩺 Kalkulator Tensi + Koreksi (Usia, Jenis Kelamin, Tinggi, Berat)</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #dff1fa 0%, #bee0f0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 20px;
        }
        .fixed-note {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 14px 20px;
            background: rgba(2, 132, 199, 0.95);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 850;
            z-index: 999;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .fixed-note img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            border-radius: 6px;
        }
        .app-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px #105e7d;
            border: 1px solid rgba(255,255,255,0.7);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #005f8c, #0284c7);
            padding: 30px 35px;
            color: white;
            text-align: center;
        }
        .header h1 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header h1 i {
            color: #fcd34d;
            text-shadow: 0 3px 8px #00000030;
        }
        .header .sub {
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.9;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .header .sub i {
            margin-right: 6px;
            color: #bae6fd;
        }
        .main-content {
            padding: 35px 35px 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #f3fafd;
            padding: 30px;
            border-radius: 40px;
            box-shadow: inset 0 2px 8px #bfd9e6, 0 8px 20px -10px #1f5c79;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-weight: 600;
            color: #0b4b6b;
            font-size: 0.95rem;
        }
        .input-field label i {
            margin-right: 5px;
            color: #0284c7;
            width: 20px;
        }
        .input-field input, .input-field select {
            background: white;
            border: 2px solid #cbe6f5;
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
        }
        .input-field input:focus, .input-field select:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 4px rgba(0,119,182,0.15);
        }
        .btn-group {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        .btn {
            border: none;
            background: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 16px -8px #165e79;
            border: 1px solid #b1dbf0;
        }
        .btn-primary {
            background: #0284c7;
            color: white;
            border: none;
            flex: 2;
        }
        .btn-primary i {
            color: #fde047;
        }
        .btn-primary:hover {
            background: #0369a1;
            transform: scale(1.02);
            box-shadow: 0 12px 20px -12px #003952;
        }
        .btn-secondary {
            background: #e3f0fa;
            color: #00496b;
            flex: 1;
        }
        .btn-secondary:hover {
            background: #cbe6fd;
        }
        .hasil-panel {
            margin-top: 35px;
            background: #ecf8ff;
            border-radius: 38px;
            padding: 28px;
            border-left: 8px solid #0284c7;
            box-shadow: 0 6px 18px #b3d6ea;
        }
        .hasil-title {
            font-weight: 800;
            font-size: 1.8rem;
            color: #004e73;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tensi-badge {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-around;
            margin-bottom: 25px;
        }
        .badge-item {
            background: white;
            border-radius: 32px;
            padding: 20px 25px;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 10px 18px -8px #b1d1e5;
        }
        .badge-item .label {
            font-weight: 600;
            color: #1f5975;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .badge-item .value {
            font-size: 2.8rem;
            font-weight: 800;
            color: #003952;
            line-height: 1.2;
        }
        .badge-item .unit {
            font-size: 1rem;
            color: #2e667e;
        }
        .interpretasi {
            background: #dcf2fa;
            border-radius: 28px;
            padding: 22px;
            margin: 20px 0;
        }
        .interpretasi p {
            margin: 8px 0;
            font-size: 1.1rem;
        }
        .kategori-hasil {
            font-size: 1.5rem;
            font-weight: 800;
            color: #003952;
        }
        .detail-bmi {
            background: white;
            border-radius: 24px;
            padding: 15px 20px;
            border: 1px solid #b3dff2;
        }
        .footer-disclaimer {
            background: #d6e9f2;
            padding: 18px 32px;
            font-size: 0.9rem;
            color: #1d4e66;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            border-top: 2px solid #b1d1e5;
        }
        .footer-disclaimer i {
            color: #b22222;
            font-size: 2rem;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.7rem; }
            .form-grid { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="fixed-note">
        <img src="https://storage.pusdokkes.polri.go.id/pusdokkes/logo.png" alt="Logo" />
        DOKPOL POLRESTRO BEKASI
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Lambang_Polda_Metro_Jaya.png" alt="Logo Polda Metro Jaya" />
    </div>
    <div class="app-card">
        <div class="header">
            <h1>
                <i class="fas fa-heart-pulse"></i> TensiKoreksi+ 
            </h1>
            <div class="sub">
                <span><i class="fas fa-venus-mars"></i> Jenis kelamin</span>
                <span><i class="fas fa-calendar-alt"></i> Usia</span>
                <span><i class="fas fa-weight-scale"></i> Tinggi & Berat</span>
            </div>
        </div>

        <div class="main-content">
            <div class="form-grid">
                <!-- Input tekanan darah -->
                <div class="input-field">
                    <label for="sistol"><i class="fas fa-arrow-up"></i> Sistolik (mmHg)</label>
                    <input type="number" id="sistol" min="50" max="250" value="120" step="1">
                </div>
                <div class="input-field">
                    <label for="diastol"><i class="fas fa-arrow-down"></i> Diastolik (mmHg)</label>
                    <input type="number" id="diastol" min="30" max="150" value="80" step="1">
                </div>

                <!-- Data pasien -->
                <div class="input-field">
                    <label for="usia"><i class="fas fa-calendar"></i> Usia (tahun)</label>
                    <input type="number" id="usia" min="0" max="120" value="45" step="1">
                </div>
                <div class="input-field">
                    <label for="gender"><i class="fas fa-venus-mars"></i> Jenis Kelamin</label>
                    <select id="gender">
                        <option value="laki">Laki-laki</option>
                        <option value="perempuan" selected>Perempuan</option>
                    </select>
                </div>
                <div class="input-field">
                    <label for="tinggi"><i class="fas fa-ruler-vertical"></i> Tinggi (cm)</label>
                    <input type="number" id="tinggi" min="50" max="250" value="165" step="0.1">
                </div>
                <div class="input-field">
                    <label for="berat"><i class="fas fa-weight-scale"></i> Berat (kg)</label>
                    <input type="number" id="berat" min="10" max="200" value="70" step="0.1">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="hitungBtn"><i class="fas fa-calculator"></i> Hitung & Interpretasi</button>
                    <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset</button>
                </div>
            </div>

            <!-- Hasil panel -->
            <div class="hasil-panel" id="hasilPanel">
                <div class="hasil-title">
                    <i class="fas fa-clipboard-check"></i> Hasil Evaluasi
                </div>
                <div id="hasilKonten">
                    <!-- akan diisi javascript -->
                    <div style="text-align: center; color: #2a607c; padding: 20px;">
                        <i class="fas fa-hand-point-right fa-2x"></i>
                        <p>Masukkan data lalu tekan "Hitung & Interpretasi".</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-disclaimer">
            <div><strong>2026 - NVY25</strong></div>
        </div>
    </div>

    <script>
        // Elemen
        const sistolInp = document.getElementById('sistol');
        const diastolInp = document.getElementById('diastol');
        const usiaInp = document.getElementById('usia');
        const genderSelect = document.getElementById('gender');
        const tinggiInp = document.getElementById('tinggi');
        const beratInp = document.getElementById('berat');
        const hitungBtn = document.getElementById('hitungBtn');
        const resetBtn = document.getElementById('resetBtn');
        const hasilKonten = document.getElementById('hasilKonten');

        // Fungsi reset ke default
        function resetForm() {
            sistolInp.value = 120;
            diastolInp.value = 80;
            usiaInp.value = 45;
            genderSelect.value = 'perempuan';
            tinggiInp.value = 165;
            beratInp.value = 70;
            // langsung hitung ulang
            hitungInterpretasi();
        }

        // Fungsi utama
        function hitungInterpretasi() {
            // Ambil nilai
            let sistol = parseFloat(sistolInp.value);
            let diastol = parseFloat(diastolInp.value);
            let usia = parseFloat(usiaInp.value);
            let gender = genderSelect.value;
            let tinggi = parseFloat(tinggiInp.value);
            let berat = parseFloat(beratInp.value);

            // Validasi dasar
            if (isNaN(sistol) || sistol < 30 || sistol > 280) sistol = 120;
            if (isNaN(diastol) || diastol < 20 || diastol > 200) diastol = 80;
            if (isNaN(usia) || usia < 0) usia = 0;
            if (isNaN(tinggi) || tinggi < 30) tinggi = 150;
            if (isNaN(berat) || berat < 2) berat = 50;

            // Hitung BMI
            let tinggiM = tinggi / 100;
            let bmi = berat / (tinggiM * tinggiM);
            let bmiKategori = '';
            if (bmi < 18.5) bmiKategori = 'Kurus (underweight)';
            else if (bmi < 25) bmiKategori = 'Normal (ideal)';
            else if (bmi < 30) bmiKategori = 'Kelebihan berat badan (overweight)';
            else bmiKategori = 'Obesitas';

            // Koreksi ambang batas tekanan darah berdasarkan usia dan gender (mengacu panduan umum)
            // Sederhana: untuk dewasa <60 tahun, target <140/90; 60-79 <150/90; >=80 <150/90 (lebih longgar)
            // Juga ada perbedaan gender tipis, tapi kita gunakan sama.
            let sistolNormal, diastolNormal;
            let kategoriTD = '';

            // Ambang batas berdasarkan usia (guideline hipertensi, dikombinasi)
            if (usia < 60) {
                sistolNormal = 140;
                diastolNormal = 90;
            } else if (usia >= 60 && usia < 80) {
                sistolNormal = 150;
                diastolNormal = 90;
            } else { // usia >= 80
                sistolNormal = 150;
                diastolNormal = 90; // kadang diastol lebih longgar, tapi kita gunakan 90
            }

            // Koreksi jenis kelamin: laki-laki sedikit lebih tinggi resiko? Tidak ubah ambang, hanya interpretasi.
            // Tentukan kategori tekanan darah berdasarkan JNC 8/ESC
            if (sistol < 120 && diastol < 80) {
                kategoriTD = 'Normal optimal';
            } else if (sistol < 130 && diastol < 80) {
                kategoriTD = 'Normal';
            } else if (sistol < 140 && diastol < 90) {
                kategoriTD = 'Normal tinggi (prehipertensi)';
            } else if (sistol < 160 && diastol < 100) {
                kategoriTD = 'Hipertensi derajat 1';
            } else if (sistol < 180 && diastol < 110) {
                kategoriTD = 'Hipertensi derajat 2';
            } else {
                kategoriTD = 'Hipertensi derajat 3 (krisis)';
            }

            // Koreksi berdasarkan usia: jika usia lanjut dan tekanan sedikit di atas target, mungkin masih dianggap normal sesuai panduan.
            // Kita akan menyesuaikan pesan.
            let pesanKoreksiUsia = '';
            if (usia >= 60 && sistol < 150 && diastol < 90) {
                pesanKoreksiUsia = 'Untuk lansia, tekanan ini masih dalam rentang yang dapat diterima.';
            } else if (usia >= 80 && sistol < 160 && diastol < 90) {
                pesanKoreksiUsia = 'Pada lansia di atas 80 tahun, target tekanan bisa lebih longgar, namun tetap dalam batas aman.';
            }

            // Tambahkan catatan BMI
            let catatanBMI = '';
            if (bmi >= 25) {
                catatanBMI = 'Kelebihan berat badan dapat meningkatkan risiko hipertensi. Menurunkan berat badan membantu mengontrol tekanan darah.';
            }

            // Gabungan
            let html = `
                <div class="tensi-badge">
                    <div class="badge-item">
                        <div class="label">Sistolik</div>
                        <div class="value">${Math.round(sistol)}</div>
                        <div class="unit">mmHg</div>
                    </div>
                    <div class="badge-item">
                        <div class="label">Diastolik</div>
                        <div class="value">${Math.round(diastol)}</div>
                        <div class="unit">mmHg</div>
                    </div>
                    <div class="badge-item">
                        <div class="label">BMI</div>
                        <div class="value">${bmi.toFixed(1)}</div>
                        <div class="unit">kg/m²</div>
                    </div>
                </div>
                <div class="interpretasi">
                    <p><span class="kategori-hasil">${kategoriTD}</span></p>
                    <p><i class="fas fa-venus-mars"></i> Jenis kelamin: ${gender === 'laki' ? 'Laki-laki' : 'Perempuan'}, Usia: ${usia} tahun</p>
                    <p><i class="fas fa-weight-scale"></i> BMI: ${bmi.toFixed(1)} (${bmiKategori})</p>
                    ${pesanKoreksiUsia ? '<p><i class="fas fa-hourglass-half"></i> ' + pesanKoreksiUsia + '</p>' : ''}
                    ${catatanBMI ? '<p><i class="fas fa-apple-alt"></i> ' + catatanBMI + '</p>' : ''}
                </div>
                <div class="detail-bmi">
                    <strong>💡 Interpretasi tambahan:</strong> Berdasarkan usia ${usia} tahun, batas hipertensi umum adalah ${sistolNormal}/${diastolNormal} mmHg. 
                    Tekanan Anda ${sistol < sistolNormal ? 'berada di bawah batas' : (sistol == sistolNormal ? 'sama dengan batas' : 'melebihi batas')} untuk sistolik, 
                    dan ${diastol < diastolNormal ? 'di bawah' : (diastol == diastolNormal ? 'sama' : 'melebihi')} untuk diastolik.
                </div>
            `;

            // Tambahkan peringatan jika tekanan sangat tinggi
            if (sistol >= 180 || diastol >= 110) {
                html += `<div style="margin-top:20px; background:#ffecdd; padding:15px; border-radius: 50px; color:#a13000;">
                    <i class="fas fa-exclamation-circle"></i> <strong>Perhatian:</strong> Tekanan darah sangat tinggi. Segera konsultasikan ke dokter.
                </div>`;
            } else if (sistol >= 160 || diastol >= 100) {
                html += `<div style="margin-top:20px; background:#fff1d2; padding:15px; border-radius: 50px; color:#875400;">
                    <i class="fas fa-exclamation-triangle"></i> Tekanan darah tinggi. Perlu pemeriksaan lanjutan.
                </div>`;
            }

            hasilKonten.innerHTML = html;
        }

        // Event listeners
        hitungBtn.addEventListener('click', hitungInterpretasi);
        resetBtn.addEventListener('click', resetForm);

        // Inisialisasi tampilan awal
        window.addEventListener('load', () => {
            hitungInterpretasi();
        });
    </script>
</body>
</html>
